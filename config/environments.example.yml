environments:
  local:
    executor: local
    path_style: windows
    # Inherits the global default execution_mode=immutable.
    basedir: ../.out
    workdir: "{basedir}/work"

  local-dev:
    executor: local
    path_style: windows
    execution_mode: workspace
    basedir: ../.out
    workdir: "{basedir}/work"

  hpcc_msu:
    executor: slurm
    name: dev
    rclone_bin: rclone
    datadir: /mnt/scratch/Viens_AgroEco_Lab/data
    host: hpcc.msu.edu
    partition: scavenger
    account: weave151
    time: "04:00:00"
    cpus_per_task: 2
    mem: "8G"
    logdir: /mnt/scratch/logs
    workdir: /mnt/scratch/work
    modules: ["gdal", "python/3.11"]
    job_limit: 1000
    array_task_limit: 1000
    max_parallel: 50
    step_max_retries: 1
    step_retry_delay_seconds: 2.0
    # Source provisioning for execution code:
    # execution_source: auto|git_remote|git_bundle|snapshot|workspace
    # auto tries: git_remote -> git_bundle -> snapshot -> workspace (if allowed)
    execution_source: auto
    # Optional offline fallback assets:
    # - for remote SLURM via ssh_host, local files are staged to the run workspace
    source_bundle: C:/path/to/repo.bundle
    source_snapshot: C:/path/to/repo_snapshot.tar.gz
    # Workspace mode is last-resort and least reproducible.
    allow_workspace_source: false
    # Optional DB connectivity for clusters that must tunnel via SSH.
    # If set, this overrides ETL_DATABASE_URL from local shell/setx.
    # database_url: "postgresql://USER:TOKEN@localhost:6543/DB?sslmode=require&options=endpoint%3Dep-xxxx"
    # Optional tunnel command executed in setup/batch scripts before loading secrets.
    # db_tunnel_command: "ssh -f -N -L 6543:ep-xxxx.c-4.us-east-1.aws.neon.tech:5432 weave151@hpcc.msu.edu"
    # Optional tunnel lifecycle mode:
    # - process: each Python process creates/owns its own tunnel and revives it if needed
    # - omit / tmux flow: executor bootstrap manages one tmux-backed tunnel per job/task
    # db_tunnel_mode: process
    # Optional: manage tunnel lifecycle with tmux (recommended when command should be cleaned up automatically).
    # db_tunnel_via_tmux: true
    # db_tunnel_session_prefix: "etl-db-tunnel"
  hpcc_beta:
    executor: slurm
    name: beta
    rclone_bin: rclone
    datadir: /hpcc/data
    host: beta.login.univ.edu
    partition: highmem
    account: proj456
    time: "08:00:00"
    cpus_per_task: 16
    mem: "64G"
    logdir: /hpcc/logs
    workdir: /hpcc/work
    conda_env: etl
