projects:
  default:
    vars:
      basedir: "/data/default"
      owner: "core"
      pipeline_assets_repo_url: "https://github.com/josephweaver/shared-etl-pipelines.git"
      pipeline_assets_local_repo_path: "../shared-etl-pipelines"
      pipeline_assets_project_key: "shared"
      pipeline_assets_pipelines_dir: "pipelines"
      pipeline_assets_scripts_dir: "scripts"

  land_core:
    vars:
      basedir: "/data/land_core"
      owner: "land-core"
      data_dictionary_repo_url: "https://github.com/land-core/landcore-data-catalog.git"
      states_of_interest: [ 'IL', 'MN', 'WI', 'OH', 'SD', 'IA', 'IN', 'MI', 'MO' ]
      pipeline_asset_sources:
        - project_key: "land_core"
          repo_url: "https://github.com/josephweaver/landcore-etl-pipelines.git"
          local_repo_path: "../landcore-etl-pipelines"
          pipelines_dir: "pipelines"
          scripts_dir: "scripts"
          ref: "main"
          priority: 100
        - project_key: "shared"
          repo_url: "https://github.com/josephweaver/shared-etl-pipelines.git"
          local_repo_path: "../shared-etl-pipelines"
          pipelines_dir: "pipelines"
          scripts_dir: "scripts"
          ref: "main"
          priority: 200
      pipeline_assets_repo_url: "https://github.com/josephweaver/landcore-etl-pipelines.git"
      pipeline_assets_local_repo_path: "../landcore-etl-pipelines"
      pipeline_assets_project_key: "land_core"
      pipeline_assets_pipelines_dir: "pipelines"
      pipeline_assets_scripts_dir: "scripts"
  gee_lee:
    vars:
      basedir: "/data/gee_lee"
      owner: "gee-lee"
      pipeline_assets_repo_url: "https://github.com/josephweaver/shared-etl-pipelines.git"
      pipeline_assets_local_repo_path: "../shared-etl-pipelines"
      pipeline_assets_project_key: "shared"
      pipeline_assets_pipelines_dir: "pipelines"
      pipeline_assets_scripts_dir: "scripts"
