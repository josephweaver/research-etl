environments:
  local:
    # programmatic: which executor implementation to use.
    executor: local

    # programmatic: how path normalization should behave during resolution.
    path_style: unix

    # programmatic: inherits the global default execution_mode=immutable.
    # This runs from pinned clean checkouts under {global.source_root}.

    # informational/programmatic where referenced by plugins or transports.
    rclone_bin: "bin/rclone"

    # ---- Template-only variables (kept at the end on purpose) ----

    # template-only: inherit the shared local output root from global config.
    basedir: "{global.basedir}"

    # template-only: derived directory variables used by pipelines and plugins.
    workdir: "{basedir}/work"
    logdir: "{basedir}/logs"
    datadir: "{basedir}/data"
    tmpdir: "{basedir}/tmp"
    artifactsdir: "{basedir}/artifacts"

  local-dev:
    # programmatic: which executor implementation to use.
    executor: local

    # programmatic: how path normalization should behave during resolution.
    path_style: unix

    # programmatic: run directly from the current mutable development workspace.
    execution_mode: workspace

    # informational/programmatic where referenced by plugins or transports.
    rclone_bin: "bin/rclone"

    # ---- Template-only variables (kept at the end on purpose) ----

    # template-only: inherit the shared local output root from global config.
    basedir: "{global.basedir}"

    # template-only: derived directory variables used by pipelines and plugins.
    workdir: "{basedir}/work"
    logdir: "{basedir}/logs"
    datadir: "{basedir}/data"
    tmpdir: "{basedir}/tmp"
    artifactsdir: "{basedir}/artifacts"

  hpcc_msu:
    # programmatic: remote executor type.
    executor: slurm
    path_style: unix
    # programmatic: per-environment override for the ETL engine source remote.
    # HPCC uses SSH-style Git URLs instead of the global HTTPS default.
    git_remote_url: "git@github.com:josephweaver/research-etl.git"
    execution_source: git_remote
    allow_workspace_source: false
    host: hpcc.msu.edu
    rclone_bin: "rclone"
    # partition: scavenger
    # account: weave151
    time: "01:00:00"
    cpus_per_task: 2
    mem: "8G"
    modules: ["Python/3.11.3-GCCcore-12.3.0", "rclone/1.63.1-amd64", "PostgreSQL/16.1-GCCcore-12.3.0"]
    job_limit: 1000
    array_task_limit: 10000
    max_parallel: 50
    ssh_timeout: 120
    scp_timeout: 300
    ssh_retries: 2
    scp_retries: 2
    remote_retry_delay_seconds: 2
    ssh_connect_timeout: 20
    ssh_strict_host_key_checking: accept-new
    ssh_host: dev-amd20
    ssh_user: f0108939
    # programmatic: immutable remote ETL and pipeline-asset checkouts live under src/.
    remote_repo: "{basedir}/src"
    source_root: "{basedir}/src"
    db_sync_queue_dir: "{workdir}/db_sync_queue/pending"
    propagate_db_secret: false
    load_secrets_file: true
    db_mode: online
    db_tunnel_mode: process
    db_tunnel_via_tmux: true
    db_tunnel_session_prefix: "etl-db-tunnel"
    db_tunnel_command: "ssh -N -o BatchMode=yes -o ExitOnForwardFailure=yes -o IdentitiesOnly=yes -i ~/.ssh/id_ed25519_hpc -L 6543:ep-sweet-sunset-ai8t67lb-pooler.c-4.us-east-1.aws.neon.tech:5432 weave151@hpcc.msu.edu"
    sync: true
    db_tunnel_host: 127.0.0.1
    db_tunnel_port: 6543
    secret_env_keys:
      - ETL_DATABASE_URL
      - OPENAI_API_KEY
      - GITHUB_TOKEN
      - GCS_HMAC_KEY
      - GCS_HMAC_SECRET
    required_secret_keys:
      - GCS_HMAC_KEY
      - GCS_HMAC_SECRET

    # ---- Template-only variables (kept at the end on purpose) ----
    basedir: /mnt/gs21/scratch/Viens_AgroEco_Lab/etl
    workdir: "{basedir}/work"
    datadir: "{basedir}/data"
    logdir: "{basedir}/logs"

  hpcc_msu_direct:
    # programmatic: remote direct-execution executor type.
    executor: hpcc_direct
    propagate_db_secret: false
    load_secrets_file: true
    db_mode: online
    db_verbose: true
    path_style: unix
    # programmatic: per-environment override for the ETL engine source remote.
    git_remote_url: "git@github.com:josephweaver/research-etl.git"
    rclone_bin: "rclone"
    modules: ["Python/3.11.3-GCCcore-12.3.0", "rclone/1.63.1-amd64", "PostgreSQL/16.1-GCCcore-12.3.0"]
    ssh_timeout: 1800
    ssh_connect_timeout: 1800
    ssh_host: dev-amd20.passwordless
    ssh_user: weave151
    # programmatic: immutable remote ETL and pipeline-asset checkouts live under src/.
    remote_repo: "{basedir}/src"
    source_root: "{basedir}/src"
    db_sync_queue_dir: "{workdir}/db_sync_queue/pending"
    db_tunnel_via_tmux: true
    db_tunnel_mode: process
    db_tunnel_session_prefix: "etl-db-tunnel"
    db_tunnel_command: "ssh -N -o BatchMode=yes -o ExitOnForwardFailure=yes -o IdentitiesOnly=yes -i ~/.ssh/id_ed25519_hpc -L 6543:ep-sweet-sunset-ai8t67lb-pooler.c-4.us-east-1.aws.neon.tech:5432 weave151@hpcc.msu.edu"
    db_tunnel_host: 127.0.0.1
    db_tunnel_port: 6543
    secret_env_keys:
      - ETL_DATABASE_URL
      - OPENAI_API_KEY
      - GITHUB_TOKEN
      - GCS_HMAC_KEY
      - GCS_HMAC_SECRET
    required_secret_keys:
      - GCS_HMAC_KEY
      - GCS_HMAC_SECRET

    # ---- Template-only variables (kept at the end on purpose) ----
    basedir: /mnt/gs21/scratch/Viens_AgroEco_Lab/etl
    workdir: "{basedir}/work"
    logdir: "{basedir}/logs"
    datadir: "{basedir}/data"

  hpcc_local:
    # programmatic: local executor profile for commands already running on HPCC.
    # Use this inside SLURM/controller worker commands; use `hpcc_msu` to submit
    # from a workstation to the remote HPCC SLURM scheduler.
    executor: local
    path_style: unix
    execution_mode: workspace
    allow_workspace_source: true
    propagate_db_secret: false
    load_secrets_file: true
    db_mode: online

    basedir: /mnt/gs21/scratch/Viens_AgroEco_Lab/etl
    workdir: "{basedir}/work"
    logdir: "{basedir}/logs"
    datadir: "{basedir}/data"

  hpcc_msu_local:
    # Compatibility alias for older controller configs. Prefer `hpcc_local`.
    executor: local
    path_style: unix
    execution_mode: workspace
    allow_workspace_source: true
    propagate_db_secret: false
    load_secrets_file: true
    db_mode: online

    basedir: /mnt/gs21/scratch/weave151/etl
    workdir: "{basedir}/work"
    logdir: "{basedir}/logs"
    datadir: "{basedir}/data"

  unix_local:
    # programmatic: local executor profile for Unix/macOS/Linux workstations.
    # This is for local execution with Unix path normalization, not SLURM submit.
    executor: local
    path_style: unix
    execution_mode: workspace
    allow_workspace_source: true
    rclone_bin: "rclone"

    # ---- Template-only variables (kept at the end on purpose) ----
    basedir: "{global.basedir}"
    workdir: "{basedir}/work"
    logdir: "{basedir}/logs"
    datadir: "{basedir}/data"
    tmpdir: "{basedir}/tmp"
    artifactsdir: "{basedir}/artifacts"
