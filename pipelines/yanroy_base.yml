vars:
  pipe:
    name: yanroy
    datadir: "{env.datadir}/{pipe.name}"
    cache_dir: "{pipe.datadir}/cache"
    gdrive:
      src: "Data/yanroy/raw"
      glob: "*"
      shared_drive_name: "Land Core Risk Model Development"
      # Shared drive ID is optional; if set it overrides shared_drive_name in the plugin.
      shared_drive_id: ""

dirs:
  raw_cache: "{pipe.cache_dir}/raw"

steps:
  - name: stage_raw_from_gdrive
    script: 'gdrive_download.py src="{pipe.gdrive.src}" out="{dirs.raw_cache}" glob="{pipe.gdrive.glob}" recursive=true shared_drive="{pipe.gdrive.shared_drive_name}" shared_drive_id="{pipe.gdrive.shared_drive_id}"'
    output_var: staged_raw
