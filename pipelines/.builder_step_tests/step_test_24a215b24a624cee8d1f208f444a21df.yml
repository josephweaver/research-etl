project_id: land_core
vars:
  dataset_id: raw.tiger_state_download_v1
  name: tiger_state
  data_class: RAW
  dictionary_repo_key: catalog
  dictionary_source_file: pipelines/tiger/state.dataset.yml
  published_target_uri: gdrive://data/etl/Tiger/States
  tiger_state_url: https://www2.census.gov/geo/tiger/TIGER2025/STATE/tl_2025_us_state.zip
dirs:
  workdir: /mnt/scratch/weave151/work/tiger_state/{sys.now.yymmdd}/{sys.now.hhmmss}-{sys.run.short_id}
  logdir: /mnt/scratch/weave151/work/tiger_state/{sys.now.yymmdd}/{sys.now.hhmmss}-{sys.run.short_id}/logs
  rawdir: /mnt/scratch/weave151/data/tiger/state/raw
  extractdir: /mnt/scratch/weave151/data/tiger/state/extract
steps:
- name: 01_download
  script: web_download_list 'out=/mnt/scratch/weave151/data/tiger/state/raw' overwrite=false
    timeout_seconds=180 'urls=https://www2.census.gov/geo/tiger/TIGER2025/STATE/tl_2025_us_state.zip'
  output_var: staged_raw
