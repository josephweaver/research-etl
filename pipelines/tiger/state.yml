project_id: land_core

vars:
  dataset_id: "raw.tiger_state_download_v1"
  stage_dataset_id: "stage.tiger_tiles_of_interest_v1"
  name: tiger_state
  data_class: STAGE
  dataset_title: "MODIS Tiles Of Interest By State"
  dataset_notes: "State-to-MODIS tile intersection derived from TIGER state boundaries and states.of.interest.csv."
  catalog_json: ".runs/catalog/catalog.json"
  catalog_repo: "../landcore-data-catalog"
  gdrive_shared_drive_name: "Land Core Risk Model Development"
  gdrive_shared_drive_id: "0AKJcAvvAyp4oUk9PVA"
  gdrive_meta_src: "Data/ETL/Meta"
  gdrive_states_glob: "states.of.interest.csv"
  gdrive_tiles_dst: "Data/ETL/Meta"

dirs:
  workdir: "{env.workdir}/{name}/{sys.now.yymmdd}/{sys.now.hhmmss}-{sys.run.short_id}"
  logdir: "{workdir}/logs"
  rawdir: "{env.basedir}/data/tiger/state/raw"
  extractdir: "{env.basedir}/data/tiger/state/extract"
  metadir: "{workdir}/meta"

steps:
  - name: 01_download_tiger_state
    plugin: web_download_list.py
    args:
      urls_file: "pipelines/tiger/state_urls.txt"
      out: "{rawdir}"
      overwrite: false
      timeout_seconds: 180
    output_var: staged_raw

  - name: 02_extract_tiger_state
    plugin: archive_extract.py
    args:
      archive_glob: "{rawdir}/*.zip"
      out: "{extractdir}"
      overwrite: true
    output_var: extracted_state

  - name: 03_facts_tiger_state
    plugin: vector_facts.py
    args:
      input_dir: "{extractdir}"
      output_dir: "{workdir}"
    output_var: vector_facts

  - name: 04_download_states_of_interest
    plugin: gdrive_download.py
    args:
      rclone_bin: "{env.rclone_bin}"
      src: "{gdrive_meta_src}"
      out: "{metadir}"
      glob: "{gdrive_states_glob}"
      recursive: false
      shared_drive: "{gdrive_shared_drive_name}"
      shared_drive_id: "{gdrive_shared_drive_id}"
    output_var: states_interest

  - name: 05_build_tiles_of_interest
    plugin: exec_script.py
    args:
      script: "scripts/tiger/build_tiles_of_interest.py"
      script_args: "--states-csv \"{states_interest.output_dir}/states.of.interest.csv\" --extract-dir \"{extractdir}\" --output-csv \"{metadir}/tiles.of.interest.csv\" --verbose"
      verbose: true
    output_var: tiles_builder

  - name: 06_upload_tiles_of_interest
    plugin: gdrive_upload.py
    args:
      rclone_bin: "{env.rclone_bin}"
      input_path: "{metadir}/tiles.of.interest.csv"
      dst: "{gdrive_tiles_dst}"
      shared_drive: "{gdrive_shared_drive_name}"
      shared_drive_id: "{gdrive_shared_drive_id}"
      no_clobber: false
    output_var: tiles_upload

  - name: 07_ai_evidence_tiles_of_interest
    plugin: ai_dataset_evidence_bundle.py
    args:
      dataset_id: "{stage_dataset_id}"
      input_path: "{metadir}/tiles.of.interest.csv"
      output_dir: "{workdir}/ai_context"
      supplemental_urls: "{tiles_upload.output_path}"
      notes: "{dataset_notes}"
    output_var: evidence

  - name: 08_ai_research_tiles_of_interest
    plugin: ai_dataset_research.py
    args:
      dataset_id: "{stage_dataset_id}"
      data_class: "{data_class}"
      title: "{dataset_title}"
      artifact_uri: "{tiles_upload.output_path}"
      sample_file: "{evidence.sample_file}"
      schema_file: "{evidence.schema_file}"
      notes_file: "{evidence.notes_file}"
      supplemental_urls_file: "{evidence.supplemental_urls_file}"
      output_dir: "{workdir}/catalog_ai"
    output_var: catalog_ai

  - name: 09_catalog_json_upsert_tiles_of_interest
    plugin: catalog_json_upsert.py
    args:
      research_file: "{catalog_ai.output_file}"
      catalog_json: "{catalog_json}"
      project_id: land_core
      source_step: ai_research_tiles_of_interest
    output_var: catalog_json_out

  - name: 10_catalog_yaml_sync_tiles_of_interest
    plugin: catalog_yaml_sync.py
    args:
      dataset_id: "{stage_dataset_id}"
      catalog_json: "{catalog_json}"
      catalog_repo: "{catalog_repo}"
      overwrite_managed_fields: false
    output_var: catalog_yaml
