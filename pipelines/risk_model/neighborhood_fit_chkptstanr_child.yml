project_id: land_core
shared_with_projects:
  - crop_insurance

vars:
  dataset_id: model.landcore_neighborhood_fit_chkptstanr_child_v1
  name: landcore_neighborhood_fit_chkptstanr_child
  county_fips: "00000"
  fit_root: "/mnt/scratch/weave151/fits"
  county_fit_dir: "{fit_root}/{county_fips}"
  run_dir: "{county_fit_dir}/run"
  county_input_csv: "{county_fit_dir}/county_data.csv"
  checkpoint_dir: "{run_dir}/chkpt"
  output_model_rds: "{county_fit_dir}/output_model"
  fit_script_path: "{sys.projectdir}/scripts/model/Neighborhood_fit_chkptstanr.R"
  rscript_bin: "Rscript"
  iter_warmup: 1000
  iter_sampling: 1000
  iter_per_chkpt: 100
  chains: 2
  seed: 1234
  stop_after: ""
  reset: 0

dirs:
  workdir: "{run_dir}"
  logdir: "{run_dir}/logs"

steps:
  - name: "{sys.step.NN}_fit_neighborhood_chkptstanr"
    plugin: exec_script
    args:
      script: "{fit_script_path}"
      python_bin: "{rscript_bin}"
      cwd: "{run_dir}"
      script_args: "\"{county_input_csv}\" \"{checkpoint_dir}\" {iter_warmup} {iter_sampling} {iter_per_chkpt} {chains} {seed} \"{stop_after}\" {reset}"
      verbose: true
    resources:
      mem: "16G"
      cpus_per_task: 4
      time: "04:00:00"
    output_var: fit_result
