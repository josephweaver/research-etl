requires_pipelines:
  - pipelines/yanroy/download.yml
vars:
  name: yanroy.extract_fields
dirs:
  workdir: "{env.workdir}/yanroy/fields/{sys.now.yymmdd}/{sys.now.hhmmss}-{sys.run.short_id}"
  archivedir: "{env.basedir}\\data\\yanroy\\raw"
  logdir: "{workdir}/logs"
  fieldsdir: "{env.basedir}\\data\\yanroy\\fields"
steps:
  - name: 01_unzip
    plugin: archive_extract.py
    args:
      archive_glob: "{archivedir}\\ReleaseData.7z"
      out: "{fieldsdir}"
      include_glob: "**/*field_segments*.hdr,**/*field_segments"
  - name: 02_facts
    plugin: raster_facts.py
    foreach_glob: "{fieldsdir}/**/*field_segments"
    foreach_kind: dirs
    parallel_with: raster_facts_dirs
    args:
      input_dir: "{item}"
      output_dir: "{workdir}/raster_facts/{item_name}_{item_index}"
      probe_unknown: true

  - name: 03a_combine_raster_facts_csv
    plugin: combine_files.py
    parallel_with: step03
    args:
      input_glob: "{workdir}/raster_facts/*/raster_facts.csv"
      output_file: "{workdir}/raster_facts/raster_facts.csv"
      format: csv

  - name: 03b_combine_raster_facts_json
    plugin: combine_files.py
    parallel_with: step03
    args:
      input_glob: "{workdir}/raster_facts/*/raster_facts.json"
      output_file: "{workdir}/raster_facts/raster_facts.json"
      format: json

  - name: 03c_combine_file_manifest_csv
    plugin: combine_files.py
    parallel_with: step03
    args:
      input_glob: "{workdir}/raster_facts/*/file_manifest.csv"
      output_file: "{workdir}/raster_facts/file_manifest.csv"
      format: csv

  - name: 03d_combine_file_manifest_json
    plugin: combine_files.py
    parallel_with: step03
    args:
      input_glob: "{workdir}/raster_facts/*/file_manifest.json"
      output_file: "{workdir}/raster_facts/file_manifest.json"
      format: json
