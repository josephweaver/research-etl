controller:
  # Assumption for first cut: one checkpoint JSON per county under the stable county run dir.
  # If your R checkpoint writer uses a different filename/location, update this glob.
  checkpoints_glob: "/mnt/scratch/weave151/fits/*/run/chkpt/checkpoint.json"
  state_path: "controler/state.json"
  local_wave_dir: "controler/waves"
  remote_wave_dir: "/mnt/gs21/scratch/weave151/etl/controler/waves"
  remote_submit_dir: "/mnt/gs21/scratch/weave151/etl/controler/waves"
  remote_log_dir: "/mnt/gs21/scratch/weave151/etl/controler/logs"
  complete_markers:
    - "process complete."
  continue_markers:
    - "resume to process the next batch"
  max_submit: 350

checkpoint:
  fips_key: "fips"
  log_path_key: "log_path"
  status_key: "status"
  completed_iter_key: "completed_iter"
  target_iter_key: "target_iter"

slurm:
  environments_config: "config/environments.yml"
  environment: "hpcc_msu"
  job_name_prefix: "risk-fit-wave"
  time: "04:00:00"
  cpus_per_task: 4
  mem: "16G"
  array_max_parallel: 50
  verbose: false

worker:
  mode: "etl_pipeline"
  repo_root: "/mnt/gs21/scratch/weave151/etl/src/research-etl"
  python_bin: "/mnt/gs21/scratch/weave151/etl/src/research-etl/.venv/bin/python"
  cli_path: "cli.py"
  bootstrap_lines:
    - "source \"$HOME/.bashrc\" || true"
  pipeline_repo_root: "/mnt/gs21/scratch/weave151/etl/src/landcore-etl-pipelines"
  pipeline_git_remote_url: "git@github.com:josephweaver/landcore-etl-pipelines.git"
  pipeline_path: "/mnt/gs21/scratch/weave151/etl/src/landcore-etl-pipelines/pipelines/risk_model/neighborhood_fit_chkptstanr_child.yml"
  executor: "local"
  environments_config: "config/environments.yml"
  env: "hpcc_msu_local"
  project_id: "land_core"
  flags:
    - "--allow-workspace-source"
    - "--allow-dirty-git"
  vars:
    county_fips: "{fips}"
    fit_root: "/mnt/scratch/weave151/fits"
