name: Tests

on:
  push:
    branches:
      - "**"
    paths:
      - "cli.py"
      - "pyproject.toml"
      - "requirements.txt"
      - "requirements-dev.txt"
      - "etl/**"
      - "tests/**"
      - "db/ddl/**"
      - ".github/workflows/tests.yml"
  pull_request:
    paths:
      - "cli.py"
      - "pyproject.toml"
      - "requirements.txt"
      - "requirements-dev.txt"
      - "etl/**"
      - "tests/**"
      - "db/ddl/**"
      - ".github/workflows/tests.yml"

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Package smoke test
        run: |
          etl --version
          etl validate pipelines/sample.yml

      - name: Run tests
        run: python -m pytest -q -m "not integration"

  pytest-integration-postgres:
    runs-on: ubuntu-latest
    needs: pytest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: etl
          POSTGRES_PASSWORD: etl
          POSTGRES_DB: etl_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U etl -d etl_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      ETL_DATABASE_URL: postgresql://etl:etl@127.0.0.1:5432/etl_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Wait for Postgres
        run: |
          python - <<'PY'
          import os
          import time
          import psycopg

          dsn = os.environ["ETL_DATABASE_URL"]
          last = None
          for _ in range(30):
              try:
                  with psycopg.connect(dsn):
                      print("Postgres is ready")
                      raise SystemExit(0)
              except Exception as exc:
                  last = exc
                  time.sleep(1)
          raise SystemExit(f"Postgres not ready: {last}")
          PY

      - name: Run integration tests
        run: python -m pytest -q -m "integration"
